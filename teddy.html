<!DOCTYPE html>

<head>

<title>Cute Teddy 🧸</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:cursive;
  background:linear-gradient(135deg,#ffcce6,#ff80bf,#ff4da6);
  color:white;
  text-align:center;
}
h1{font-size:40px;}
.teddy{
  font-size:200px;
  animation:bounce 2s infinite;

  0%,100%{transform:translateY(0);}

}
p{font-size:22px; max-width:500px;}
.btn{
  padding:15px 35px;
  font-size:20px;
  background:white;
  color:#ff0066;
  text-decoration:none;
  border-radius:40px;
}
</style>
</head>
