<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Cake 🎂</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:cursive;
  background:linear-gradient(135deg,#ff99cc,#ff66b2,#ff3399);
  color:white;
  text-align:center;
}
h1{font-size:40px;}
.cake{
  font-size:180px;
  margin:30px;
  transition:0.3s;
}
.cake:active{
  transform:scale(0.8) rotate(-10deg);
}
.btn{
  padding:15px 35px;
  font-size:20px;
  background:white;
  color:#ff0066;
  text-decoration:none;
  border-radius:40px;
}
</style>
</head>
<body>
<h1>Tap The Royal Cake 👑🎂</h1>
<div class="cake">🎂</div>
<p style="font-size:22px;">May your year be sweet and magical 💖</p>
<a href="teddy.html" class="btn">Next Surprise 🧸</a>
</body>
</html>
