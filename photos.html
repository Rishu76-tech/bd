<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess Memories 📸</title>

<style>
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#ffb3d9,#ff66b2,#ff3399);
  font-family:cursive;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

/* Title */
h1{
  margin-top:30px;
  font-size:32px;
}

/* Slider Container */
.slider-container{
  position:relative;
  width:90%;
  max-width:350px;
  height:50vh;
  margin-top:20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Images */
.slider-container img{
  position:absolute;
  left:0;
  right:0;
  margin:auto;
  width:100%;
  height:100%;
  object-fit:contain;
  opacity:0;
  transition:opacity 1s ease-in-out;
}

/* Active image */
.slider-container img.active{
  opacity:1;
}

/* Button */
.btn{
  margin:40px 0;
  padding:12px 25px;
  font-size:18px;
  background:white;
  color:#ff0066;
  text-decoration:none;
  border-radius:30px;
}
</style>
</head>

<body>

<h1>Beautiful Girl 👑📸</h1>

<div class="slider-container">
  <img src="Palu/p1.png" class="active">
  <img src="Palu/p2.png">
  <img src="Palu/p3.png">
  <img src="Palu/p4.png">
</div>

<a href="final.html" class="btn">Final Royal Wish 💌</a>

<script>
const slides = document.querySelectorAll(".slider-container img");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 2500);
</script>

</body>
</html>
